<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สุ่มรางวัลใหญ่ Home Coming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;800&family=Caveat:wght@600&display=swap');
        body { font-family: 'Prompt', sans-serif; background: #fdf6e3; background-image: radial-gradient(#d4b483 1px, transparent 1px); background-size: 20px 20px; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .handwriting { font-family: 'Caveat', cursive; }
        .slot-box { border: 4px solid #ea580c; border-radius: 1.5rem; background: white; box-shadow: 8px 8px 0px #ea580c; padding: 3rem 2rem; width: 100%; max-width: 600px; text-align: center; }
        .winner-name { font-size: 3.5rem; font-weight: 800; color: #9a3412; min-height: 120px; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .blur-text { filter: blur(3px); opacity: 0.7; }
        @keyframes tada { 0% { transform: scale3d(1, 1, 1); } 10%, 20% { transform: scale3d(.9, .9, .9) rotate3d(0, 0, 1, -3deg); } 30%, 50%, 70%, 90% { transform: scale3d(1.1, 1.1, 1.1) rotate3d(0, 0, 1, 3deg); } 40%, 60%, 80% { transform: scale3d(1.1, 1.1, 1.1) rotate3d(0, 0, 1, -3deg); } 100% { transform: scale3d(1, 1, 1); } }
        .tada { animation: tada 1s ease-in-out; }
    </style>
</head>
<body>

    <div class="slot-box relative">
        <h1 class="text-5xl handwriting text-orange-600 mb-6 drop-shadow-sm">Grand Prize Draw!</h1>
        <p class="text-amber-700 font-bold mb-8">จำนวนผู้มีสิทธิ์ (ตอบครบ 10 ข้อ): <span id="user-count" class="text-xl text-orange-600">กำลังโหลด...</span> คน</p>

        <div class="bg-amber-50 rounded-xl border-2 border-dashed border-amber-300 mb-8 py-6">
            <p id="winner-nickname" class="text-2xl text-orange-500 font-bold mb-2">---</p>
            <div id="winner-fullname" class="winner-name blur-text">รอการสุ่ม</div>
            <p id="winner-faculty" class="text-xl text-amber-800 font-semibold mt-4">---</p>
        </div>

        <button id="draw-btn" onclick="startDraw()" class="bg-orange-600 hover:bg-orange-700 text-white px-10 py-5 rounded-full text-3xl font-bold shadow-[4px_4px_0px_#7c2d12] active:shadow-none active:translate-y-1 transition-all w-full" disabled>
            ⏳ กำลังโหลดข้อมูล...
        </button>

        <canvas id="confetti" class="fixed inset-0 pointer-events-none z-50"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // ใส่ลิงก์ New Deployment เดียวกันกับหน้าแรก
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzip0lqIWGnNMN1y6IGvXsjrz3kE6-W4JRN_A9Q-YAererYKisfCY9YMGgOjfG8eh99cQ/exec"; 
        
        let eligibleUsers = [];
        let isDrawing = false;

        // ดึงข้อมูลตอนเปิดหน้าเว็บ
        window.onload = async () => {
            try {
                const response = await fetch(SCRIPT_URL);
                const result = await response.json();
                if (result.status === "success") {
                    eligibleUsers = result.users;
                    document.getElementById('user-count').innerText = eligibleUsers.length;
                    
                    const btn = document.getElementById('draw-btn');
                    if(eligibleUsers.length > 0) {
                        btn.innerText = "🎉 กดเพื่อสุ่มรางวัล";
                        btn.disabled = false;
                    } else {
                        btn.innerText = "ยังไม่มีผู้มีสิทธิ์";
                    }
                }
            } catch (error) {
                alert("โหลดข้อมูลไม่สำเร็จ กรุณารีเฟรชหน้าเว็บ");
            }
        };

        function startDraw() {
            if (isDrawing || eligibleUsers.length === 0) return;
            isDrawing = true;
            
            const btn = document.getElementById('draw-btn');
            const nameEl = document.getElementById('winner-fullname');
            const nickEl = document.getElementById('winner-nickname');
            const facEl = document.getElementById('winner-faculty');
            
            btn.disabled = true;
            nameEl.classList.add('blur-text');
            nameEl.classList.remove('tada');

            // เอฟเฟกต์สุ่มชื่อเร็วๆ
            let counter = 0;
            const interval = setInterval(() => {
                const randomUser = eligibleUsers[Math.floor(Math.random() * eligibleUsers.length)];
                nameEl.innerText = randomUser.fullName || "---";
                nickEl.innerText = randomUser.nickname || "---";
                facEl.innerText = randomUser.faculty || "---";
                counter++;

                if (counter > 30) { // สุ่ม 30 รอบ (ประมาณ 3 วินาที)
                    clearInterval(interval);
                    showWinner();
                }
            }, 100);
        }

        function showWinner() {
            const nameEl = document.getElementById('winner-fullname');
            const btn = document.getElementById('draw-btn');
            
            // ผู้ชนะตัวจริง
            const winner = eligibleUsers[Math.floor(Math.random() * eligibleUsers.length)];
            
            nameEl.classList.remove('blur-text');
            nameEl.classList.add('tada'); // เด้งดึ๋ง
            
            document.getElementById('winner-fullname').innerText = winner.fullName;
            document.getElementById('winner-nickname').innerText = `คุณ ${winner.nickname}`;
            document.getElementById('winner-faculty').innerText = winner.faculty;

            // พลุฉลอง
            confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 }, colors: ['#ea580c', '#fde047', '#3b82f6'] });

            setTimeout(() => {
                btn.innerText = "🔄 สุ่มอีกครั้ง";
                btn.disabled = false;
                isDrawing = false;
            }, 1000);
        }
    </script>
</body>
</html>
